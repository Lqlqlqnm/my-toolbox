<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相关性发现器 PRD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #e8e4df; padding: 48px 24px; display: flex; flex-wrap: wrap; justify-content: center; gap: 56px; min-height: 100vh; }
  .column { display: flex; flex-direction: column; align-items: center; }
  .frame-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #9a9590; margin-bottom: 16px; }
  .phone { width: 393px; height: 852px; border-radius: 55px; position: relative; overflow: hidden; box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 40px 100px -20px rgba(0,0,0,0.15); }
  .phone::before { content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 126px; height: 37px; background: #000; border-radius: 20px; z-index: 100; }
  .screen { width: 100%; height: 100%; overflow-y: auto; padding: 72px 0 40px; }
  .screen::-webkit-scrollbar { display: none; }
  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; z-index: 50; }

  .hero { padding: 0 24px; margin-bottom: 24px; }
  .hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .hero-title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; }

  .rating-card { margin: 0 16px 14px; border-radius: 18px; padding: 20px; }
  .rating-date { text-align: center; font-size: 14px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .rating-nav { font-size: 16px; cursor: pointer; }
  .today-tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px; }
  .rating-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; }
  .rating-label { font-size: 14px; font-weight: 500; }
  .rating-dots { display: flex; gap: 8px; }
  .rating-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; cursor: pointer; }
  .divider { height: 1px; }

  .number-card { margin: 0 16px 14px; border-radius: 18px; padding: 20px; }
  .number-title { font-size: 12px; font-weight: 600; margin-bottom: 14px; }
  .number-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
  .number-label { font-size: 14px; font-weight: 500; }
  .number-control { display: flex; align-items: center; gap: 12px; }
  .number-btn { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; }
  .number-value { font-size: 16px; font-weight: 700; min-width: 24px; text-align: center; }
  .number-unit { font-size: 12px; }

  .save-btn { margin: 6px 16px 0; padding: 16px; border-radius: 14px; text-align: center; font-size: 15px; font-weight: 600; cursor: pointer; }

  /* LIGHT */
  .light .screen { background: #f6f4f1; }
  .light .home-indicator { background: rgba(0,0,0,0.18); }
  .light .hero-eyebrow { color: #5a7a9a; }
  .light .hero-title { color: #1a1816; }
  .light .rating-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.04); }
  .light .rating-date { color: #1a1816; }
  .light .rating-nav { color: #b0aaa5; }
  .light .today-tag { background: rgba(90,122,154,0.08); color: #5a7a9a; }
  .light .rating-label { color: #3a3530; }
  .light .rating-dot { background: rgba(0,0,0,0.04); color: #8a8580; }
  .light .rating-dot.selected { background: rgba(90,122,154,0.12); color: #3a5a7a; }
  .light .divider { background: rgba(0,0,0,0.04); }
  .light .number-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.04); }
  .light .number-title { color: #8a8580; }
  .light .number-label { color: #3a3530; }
  .light .number-btn { background: rgba(0,0,0,0.04); color: #6a6560; }
  .light .number-value { color: #1a1816; }
  .light .number-unit { color: #9a9590; }
  .light .save-btn { background: #3a5a7a; color: #fff; box-shadow: 0 6px 20px rgba(58,90,122,0.2); }

  /* DARK */
  .dark .screen { background: #111110; }
  .dark .home-indicator { background: rgba(255,255,255,0.2); }
  .dark .hero-eyebrow { color: #8aafc8; }
  .dark .hero-title { color: #f0ece8; }
  .dark .rating-card { background: rgba(255,255,255,0.02); border: 0.5px solid rgba(255,255,255,0.05); }
  .dark .rating-date { color: #f0ece8; }
  .dark .rating-nav { color: #4a4540; }
  .dark .today-tag { background: rgba(138,175,200,0.1); color: #8aafc8; }
  .dark .rating-label { color: #b0aaa5; }
  .dark .rating-dot { background: rgba(255,255,255,0.04); color: #5a5550; }
  .dark .rating-dot.selected { background: rgba(138,175,200,0.12); color: #8aafc8; }
  .dark .divider { background: rgba(255,255,255,0.04); }
  .dark .number-card { background: rgba(255,255,255,0.02); border: 0.5px solid rgba(255,255,255,0.05); }
  .dark .number-title { color: #5a5550; }
  .dark .number-label { color: #b0aaa5; }
  .dark .number-btn { background: rgba(255,255,255,0.05); color: #8a8580; }
  .dark .number-value { color: #f0ece8; }
  .dark .number-unit { color: #5a5550; }
  .dark .save-btn { background: #8aafc8; color: #111110; }
</style>
</head>
<body>

<!-- LIGHT -->
<div class="column">
  <div class="frame-label">Light · 相关性发现器</div>
  <div class="phone light">
    <div class="screen">
      <div class="hero"><div class="hero-eyebrow">相关性发现器</div><div class="hero-title">每日记录</div></div>
      <div class="rating-card">
        <div class="rating-date"><span class="rating-nav">‹</span> 6月13日 周五 <span class="today-tag">今天</span> <span class="rating-nav">›</span></div>
        <div class="rating-row"><span class="rating-label">情绪</span><div class="rating-dots"><div class="rating-dot">1</div><div class="rating-dot">2</div><div class="rating-dot selected">3</div><div class="rating-dot">4</div><div class="rating-dot">5</div></div></div>
        <div class="divider"></div>
        <div class="rating-row"><span class="rating-label">精力</span><div class="rating-dots"><div class="rating-dot">1</div><div class="rating-dot">2</div><div class="rating-dot">3</div><div class="rating-dot selected">4</div><div class="rating-dot">5</div></div></div>
        <div class="divider"></div>
        <div class="rating-row"><span class="rating-label">效率</span><div class="rating-dots"><div class="rating-dot">1</div><div class="rating-dot">2</div><div class="rating-dot">3</div><div class="rating-dot">4</div><div class="rating-dot">5</div></div></div>
        <div class="divider"></div>
        <div class="rating-row"><span class="rating-label">压力</span><div class="rating-dots"><div class="rating-dot">1</div><div class="rating-dot">2</div><div class="rating-dot selected">3</div><div class="rating-dot">4</div><div class="rating-dot">5</div></div></div>
        <div class="divider"></div>
        <div class="rating-row"><span class="rating-label">睡眠质量</span><div class="rating-dots"><div class="rating-dot">1</div><div class="rating-dot">2</div><div class="rating-dot">3</div><div class="rating-dot">4</div><div class="rating-dot">5</div></div></div>
      </div>
      <div class="number-card">
        <div class="number-title">数值记录</div>
        <div class="number-row"><span class="number-label">睡眠时长</span><div class="number-control"><div class="number-btn">−</div><div class="number-value">—</div><div class="number-btn">+</div><span class="number-unit">h</span></div></div>
        <div class="number-row"><span class="number-label">午睡时长</span><div class="number-control"><div class="number-btn">−</div><div class="number-value">—</div><div class="number-btn">+</div><span class="number-unit">min</span></div></div>
      </div>
      <div class="save-btn">保存今天</div>
    </div>
    <div class="home-indicator"></div>
  </div>
</div>

<!-- DARK -->
<div class="column">
  <div class="frame-label">Dark · 相关性发现器</div>
  <div class="phone dark">
    <div class="screen">
      <div class="hero"><div class="hero-eyebrow">相关性发现器</div><div class="hero-title">每日记录</div></div>
      <div class="rating-card">
        <div class="rating-date"><span class="rating-nav">‹</span> 6月13日 周五 <span class="today-tag">今天</span> <span class="rating-nav">›</span></div>
        <div class="rating-row"><span class="rating-label">情绪</span><div class="rating-dots"><div class="rating-dot">1</div><div class="rating-dot">2</div><div class="rating-dot selected">3</div><div class="rating-dot">4</div><div class="rating-dot">5</div></div></div>
        <div class="divider"></div>
        <div class="rating-row"><span class="rating-label">精力</span><div class="rating-dots"><div class="rating-dot">1</div><div class="rating-dot">2</div><div class="rating-dot">3</div><div class="rating-dot selected">4</div><div class="rating-dot">5</div></div></div>
        <div class="divider"></div>
        <div class="rating-row"><span class="rating-label">效率</span><div class="rating-dots"><div class="rating-dot">1</div><div class="rating-dot">2</div><div class="rating-dot">3</div><div class="rating-dot">4</div><div class="rating-dot">5</div></div></div>
        <div class="divider"></div>
        <div class="rating-row"><span class="rating-label">压力</span><div class="rating-dots"><div class="rating-dot">1</div><div class="rating-dot">2</div><div class="rating-dot selected">3</div><div class="rating-dot">4</div><div class="rating-dot">5</div></div></div>
        <div class="divider"></div>
        <div class="rating-row"><span class="rating-label">睡眠质量</span><div class="rating-dots"><div class="rating-dot">1</div><div class="rating-dot">2</div><div class="rating-dot">3</div><div class="rating-dot">4</div><div class="rating-dot">5</div></div></div>
      </div>
      <div class="number-card">
        <div class="number-title">数值记录</div>
        <div class="number-row"><span class="number-label">睡眠时长</span><div class="number-control"><div class="number-btn">−</div><div class="number-value">—</div><div class="number-btn">+</div><span class="number-unit">h</span></div></div>
        <div class="number-row"><span class="number-label">午睡时长</span><div class="number-control"><div class="number-btn">−</div><div class="number-value">—</div><div class="number-btn">+</div><span class="number-unit">min</span></div></div>
      </div>
      <div class="save-btn">保存今天</div>
    </div>
    <div class="home-indicator"></div>
  </div>
</div>

</body>
</html>
