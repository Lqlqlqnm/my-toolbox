<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 策略助手 · 持仓页 PRD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #e8e4df; padding: 48px 24px; display: flex; flex-wrap: wrap; justify-content: center; gap: 56px; min-height: 100vh; }
  .column { display: flex; flex-direction: column; align-items: center; }
  .frame-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #9a9590; margin-bottom: 16px; }
  .phone { width: 393px; height: 852px; border-radius: 55px; position: relative; overflow: hidden; box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 40px 100px -20px rgba(0,0,0,0.15); }
  .phone::before { content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 126px; height: 37px; background: #000; border-radius: 20px; z-index: 100; }
  .screen { width: 100%; height: 100%; overflow-y: auto; padding: 72px 0 72px; }
  .screen::-webkit-scrollbar { display: none; }
  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; z-index: 50; }
  .tab-bar { position: absolute; bottom: 20px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-around; padding: 10px 4px; border-radius: 16px; z-index: 90; }
  .tab-item { font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 10px; cursor: pointer; }

  .hero { padding: 0 24px; margin-bottom: 24px; }
  .hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .hero-title { font-size: 32px; font-weight: 800; letter-spacing: -1px; }

  /* Portfolio card */
  .portfolio-card { margin: 0 16px 20px; border-radius: 22px; padding: 28px 24px; position: relative; overflow: hidden; }
  .portfolio-card::after { content: ''; position: absolute; top: -50px; right: -30px; width: 150px; height: 150px; border-radius: 50%; opacity: 0.06; }
  .portfolio-label { font-size: 12px; font-weight: 500; margin-bottom: 8px; }
  .portfolio-value { font-size: 38px; font-weight: 900; letter-spacing: -1.5px; line-height: 1; margin-bottom: 14px; }
  .portfolio-meta { display: flex; gap: 20px; font-size: 13px; }
  .portfolio-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .portfolio-meta-label { font-size: 11px; }

  /* Section */
  .section { margin: 0 16px; padding: 16px 0; }
  .section-title { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; margin-bottom: 12px; }
  .empty-state { text-align: center; padding: 40px 20px; border-radius: 16px; }
  .empty-text { font-size: 14px; }

  /* LIGHT */
  .light .screen { background: #f6f4f1; }
  .light .home-indicator { background: rgba(0,0,0,0.18); }
  .light .tab-bar { background: rgba(255,255,255,0.72); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 0.5px solid rgba(255,255,255,0.8); box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .light .tab-item { color: #a0998f; }
  .light .tab-item.active { color: #3d6b55; background: rgba(61,107,85,0.08); }
  .light .hero-eyebrow { color: #7a9a88; }
  .light .hero-title { color: #1a1816; }
  .light .portfolio-card { background: linear-gradient(145deg, #3d5a6e 0%, #2a4254 100%); }
  .light .portfolio-card::after { background: #7aa0b8; }
  .light .portfolio-label { color: rgba(255,255,255,0.5); }
  .light .portfolio-value { color: #fff; }
  .light .portfolio-meta-label { color: rgba(255,255,255,0.4); }
  .light .portfolio-meta { color: rgba(255,255,255,0.7); }
  .light .portfolio-meta .highlight { color: #7dd4a0; }
  .light .section-title { color: #8a8580; }
  .light .empty-state { background: rgba(255,255,255,0.5); border: 0.5px solid rgba(0,0,0,0.04); }
  .light .empty-text { color: #b5b0aa; }

  /* DARK */
  .dark .screen { background: #111110; }
  .dark .home-indicator { background: rgba(255,255,255,0.2); }
  .dark .tab-bar { background: rgba(30,30,28,0.8); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 0.5px solid rgba(255,255,255,0.06); box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  .dark .tab-item { color: #4a4540; }
  .dark .tab-item.active { color: #7aba95; background: rgba(122,186,149,0.08); }
  .dark .hero-eyebrow { color: #7aba95; }
  .dark .hero-title { color: #f0ece8; }
  .dark .portfolio-card { background: linear-gradient(145deg, #1a2e3a 0%, #142228 100%); border: 0.5px solid rgba(255,255,255,0.06); }
  .dark .portfolio-card::after { background: #5a8aa0; }
  .dark .portfolio-label { color: #5a5550; }
  .dark .portfolio-value { color: #f0ece8; }
  .dark .portfolio-meta-label { color: #3a3530; }
  .dark .portfolio-meta { color: #8a8580; }
  .dark .portfolio-meta .highlight { color: #5ab87a; }
  .dark .section-title { color: #5a5550; }
  .dark .empty-state { background: rgba(255,255,255,0.02); border: 0.5px solid rgba(255,255,255,0.04); }
  .dark .empty-text { color: #4a4540; }
</style>
</head>
<body>

<!-- LIGHT -->
<div class="column">
  <div class="frame-label">Light · 持仓</div>
  <div class="phone light">
    <div class="screen">
      <div class="hero">
        <div class="hero-eyebrow">持仓</div>
        <div class="hero-title">模拟仓总览</div>
      </div>
      <div class="portfolio-card">
        <div class="portfolio-label">总资产</div>
        <div class="portfolio-value">¥50,000</div>
        <div class="portfolio-meta">
          <div class="portfolio-meta-item"><span class="portfolio-meta-label">可用</span><span>¥50,000</span></div>
          <div class="portfolio-meta-item"><span class="portfolio-meta-label">收益</span><span class="highlight">+0 (+0.0%)</span></div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">持仓 (0)</div>
        <div class="empty-state"><div class="empty-text">暂无持仓</div></div>
      </div>
      <div class="section"><div class="section-title">已平仓 (0)</div></div>
    </div>
    <div class="tab-bar">
      <div class="tab-item">分析</div>
      <div class="tab-item active">持仓</div>
      <div class="tab-item">条件单</div>
      <div class="tab-item">自选</div>
      <div class="tab-item">统计</div>
    </div>
    <div class="home-indicator"></div>
  </div>
</div>

<!-- DARK -->
<div class="column">
  <div class="frame-label">Dark · 持仓</div>
  <div class="phone dark">
    <div class="screen">
      <div class="hero">
        <div class="hero-eyebrow">持仓</div>
        <div class="hero-title">模拟仓总览</div>
      </div>
      <div class="portfolio-card">
        <div class="portfolio-label">总资产</div>
        <div class="portfolio-value">¥50,000</div>
        <div class="portfolio-meta">
          <div class="portfolio-meta-item"><span class="portfolio-meta-label">可用</span><span>¥50,000</span></div>
          <div class="portfolio-meta-item"><span class="portfolio-meta-label">收益</span><span class="highlight">+0 (+0.0%)</span></div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">持仓 (0)</div>
        <div class="empty-state"><div class="empty-text">暂无持仓</div></div>
      </div>
      <div class="section"><div class="section-title">已平仓 (0)</div></div>
    </div>
    <div class="tab-bar">
      <div class="tab-item">分析</div>
      <div class="tab-item active">持仓</div>
      <div class="tab-item">条件单</div>
      <div class="tab-item">自选</div>
      <div class="tab-item">统计</div>
    </div>
    <div class="home-indicator"></div>
  </div>
</div>

</body>
</html>
