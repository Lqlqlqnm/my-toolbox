<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食材库存 PRD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #e8e4df; padding: 48px 24px; display: flex; flex-wrap: wrap; justify-content: center; gap: 56px; min-height: 100vh; }
  .column { display: flex; flex-direction: column; align-items: center; }
  .frame-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #9a9590; margin-bottom: 16px; }
  .phone { width: 393px; height: 852px; border-radius: 55px; position: relative; overflow: hidden; box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 40px 100px -20px rgba(0,0,0,0.15); }
  .phone::before { content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 126px; height: 37px; background: #000; border-radius: 20px; z-index: 100; }
  .screen { width: 100%; height: 100%; overflow-y: auto; padding: 72px 0 40px; }
  .screen::-webkit-scrollbar { display: none; }
  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; z-index: 50; }

  /* Hero - 以"还剩X天"为核心信息 */
  .hero { padding: 0 24px; margin-bottom: 24px; }
  .hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .hero-title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; line-height: 1.2; }

  /* Alert banner - 即将过期提醒（核心功能突出） */
  .alert-banner { margin: 0 16px 20px; border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; }
  .alert-icon { font-size: 28px; flex-shrink: 0; }
  .alert-content { flex: 1; }
  .alert-title { font-size: 14px; font-weight: 700; }
  .alert-sub { font-size: 12px; font-weight: 400; margin-top: 2px; }
  .alert-count { font-size: 24px; font-weight: 900; flex-shrink: 0; }

  /* Shelf visual - 冰箱层架隐喻 */
  .shelf { margin: 0 16px 12px; border-radius: 18px; padding: 4px; overflow: hidden; }
  .shelf-header { padding: 14px 16px 10px; display: flex; justify-content: space-between; align-items: center; }
  .shelf-name { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .shelf-count { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 6px; }
  .shelf-items { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 0 12px 14px; }
  .shelf-item { border-radius: 12px; padding: 12px 8px; text-align: center; position: relative; }
  .item-emoji { font-size: 24px; margin-bottom: 4px; }
  .item-name { font-size: 11px; font-weight: 500; margin-bottom: 2px; }
  .item-expire { font-size: 10px; font-weight: 600; border-radius: 4px; padding: 1px 6px; display: inline-block; }
  .item-expire.urgent { }
  .item-expire.ok { }

  /* Empty shelf */
  .shelf-empty { padding: 24px; text-align: center; font-size: 13px; font-weight: 400; }

  /* Fab */
  .fab { position: absolute; bottom: 28px; right: 24px; width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 80; cursor: pointer; }

  /* ===== LIGHT ===== */
  .light .screen { background: #f6f4f1; }
  .light .home-indicator { background: rgba(0,0,0,0.18); }
  .light .hero-eyebrow { color: #5a8a4a; }
  .light .hero-title { color: #1a1816; }

  .light .alert-banner { background: linear-gradient(135deg, rgba(200,100,80,0.08) 0%, rgba(200,100,80,0.03) 100%); border: 0.5px solid rgba(200,100,80,0.12); }
  .light .alert-title { color: #a0503a; }
  .light .alert-sub { color: #b08070; }
  .light .alert-count { color: #c8644a; }

  .light .shelf { background: #fff; border: 0.5px solid rgba(0,0,0,0.04); box-shadow: 0 2px 12px rgba(0,0,0,0.02); }
  .light .shelf-name { color: #1a1816; }
  .light .shelf-count { background: rgba(0,0,0,0.04); color: #8a8580; }
  .light .shelf-item { background: rgba(0,0,0,0.02); }
  .light .item-name { color: #3a3530; }
  .light .item-expire { background: rgba(90,138,74,0.08); color: #4a7a3a; }
  .light .item-expire.urgent { background: rgba(200,100,80,0.1); color: #a0503a; }
  .light .shelf-empty { color: #b0aaa5; }
  .light .fab { background: #3a6a2a; color: #fff; box-shadow: 0 6px 20px rgba(58,106,42,0.25); }

  /* ===== DARK ===== */
  .dark .screen { background: #111110; }
  .dark .home-indicator { background: rgba(255,255,255,0.2); }
  .dark .hero-eyebrow { color: #8aba7a; }
  .dark .hero-title { color: #f0ece8; }

  .dark .alert-banner { background: rgba(200,100,80,0.06); border: 0.5px solid rgba(200,100,80,0.12); }
  .dark .alert-title { color: #d88a70; }
  .dark .alert-sub { color: #8a5a4a; }
  .dark .alert-count { color: #d88a70; }

  .dark .shelf { background: rgba(255,255,255,0.02); border: 0.5px solid rgba(255,255,255,0.05); }
  .dark .shelf-name { color: #f0ece8; }
  .dark .shelf-count { background: rgba(255,255,255,0.05); color: #5a5550; }
  .dark .shelf-item { background: rgba(255,255,255,0.02); }
  .dark .item-name { color: #c0bab5; }
  .dark .item-expire { background: rgba(138,186,122,0.1); color: #8aba7a; }
  .dark .item-expire.urgent { background: rgba(216,138,112,0.12); color: #d88a70; }
  .dark .shelf-empty { color: #4a4540; }
  .dark .fab { background: #8aba7a; color: #111110; box-shadow: 0 6px 20px rgba(138,186,122,0.2); }
</style>
</head>
<body>

<!-- LIGHT -->
<div class="column">
  <div class="frame-label">Light · 食材库存</div>
  <div class="phone light">
    <div class="screen">
      <div class="hero">
        <div class="hero-eyebrow">食材库存</div>
        <div class="hero-title">冰箱里有什么？</div>
      </div>

      <div class="alert-banner">
        <div class="alert-icon">⚠️</div>
        <div class="alert-content">
          <div class="alert-title">即将过期</div>
          <div class="alert-sub">有食材需要尽快处理</div>
        </div>
        <div class="alert-count">2</div>
      </div>

      <!-- 冷藏层 -->
      <div class="shelf">
        <div class="shelf-header">
          <div class="shelf-name">🧊 冷藏</div>
          <div class="shelf-count">3 件</div>
        </div>
        <div class="shelf-items">
          <div class="shelf-item">
            <div class="item-emoji">🥬</div>
            <div class="item-name">生菜</div>
            <div class="item-expire urgent">明天</div>
          </div>
          <div class="shelf-item">
            <div class="item-emoji">🥛</div>
            <div class="item-name">牛奶</div>
            <div class="item-expire urgent">2天</div>
          </div>
          <div class="shelf-item">
            <div class="item-emoji">🥚</div>
            <div class="item-name">鸡蛋</div>
            <div class="item-expire ok">12天</div>
          </div>
        </div>
      </div>

      <!-- 冷冻层 -->
      <div class="shelf">
        <div class="shelf-header">
          <div class="shelf-name">❄️ 冷冻</div>
          <div class="shelf-count">0 件</div>
        </div>
        <div class="shelf-empty">空空如也</div>
      </div>

      <!-- 常温层 -->
      <div class="shelf">
        <div class="shelf-header">
          <div class="shelf-name">🏠 常温</div>
          <div class="shelf-count">0 件</div>
        </div>
        <div class="shelf-empty">空空如也</div>
      </div>
    </div>
    <div class="fab">+</div>
    <div class="home-indicator"></div>
  </div>
</div>

<!-- DARK -->
<div class="column">
  <div class="frame-label">Dark · 食材库存</div>
  <div class="phone dark">
    <div class="screen">
      <div class="hero">
        <div class="hero-eyebrow">食材库存</div>
        <div class="hero-title">冰箱里有什么？</div>
      </div>

      <div class="alert-banner">
        <div class="alert-icon">⚠️</div>
        <div class="alert-content">
          <div class="alert-title">即将过期</div>
          <div class="alert-sub">有食材需要尽快处理</div>
        </div>
        <div class="alert-count">2</div>
      </div>

      <div class="shelf">
        <div class="shelf-header">
          <div class="shelf-name">🧊 冷藏</div>
          <div class="shelf-count">3 件</div>
        </div>
        <div class="shelf-items">
          <div class="shelf-item">
            <div class="item-emoji">🥬</div>
            <div class="item-name">生菜</div>
            <div class="item-expire urgent">明天</div>
          </div>
          <div class="shelf-item">
            <div class="item-emoji">🥛</div>
            <div class="item-name">牛奶</div>
            <div class="item-expire urgent">2天</div>
          </div>
          <div class="shelf-item">
            <div class="item-emoji">🥚</div>
            <div class="item-name">鸡蛋</div>
            <div class="item-expire ok">12天</div>
          </div>
        </div>
      </div>

      <div class="shelf">
        <div class="shelf-header">
          <div class="shelf-name">❄️ 冷冻</div>
          <div class="shelf-count">0 件</div>
        </div>
        <div class="shelf-empty">空空如也</div>
      </div>

      <div class="shelf">
        <div class="shelf-header">
          <div class="shelf-name">🏠 常温</div>
          <div class="shelf-count">0 件</div>
        </div>
        <div class="shelf-empty">空空如也</div>
      </div>
    </div>
    <div class="fab">+</div>
    <div class="home-indicator"></div>
  </div>
</div>

</body>
</html>
