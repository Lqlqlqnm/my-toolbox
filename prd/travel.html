<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行清单 PRD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #e8e4df; padding: 48px 24px; display: flex; flex-wrap: wrap; justify-content: center; gap: 56px; min-height: 100vh; }
  .column { display: flex; flex-direction: column; align-items: center; }
  .frame-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #9a9590; margin-bottom: 16px; }
  .phone { width: 393px; height: 852px; border-radius: 55px; position: relative; overflow: hidden; box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 40px 100px -20px rgba(0,0,0,0.15); }
  .phone::before { content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 126px; height: 37px; background: #000; border-radius: 20px; z-index: 100; }
  .screen { width: 100%; height: 100%; overflow-y: auto; padding: 72px 0 40px; }
  .screen::-webkit-scrollbar { display: none; }
  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; z-index: 50; }

  .hero { padding: 0 24px; margin-bottom: 24px; }
  .hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .hero-title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; }
  .hero-sub { font-size: 13px; font-weight: 400; margin-top: 4px; }

  .progress-card { margin: 0 16px 20px; border-radius: 18px; padding: 20px; }
  .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .progress-label { font-size: 12px; font-weight: 500; }
  .progress-pct { font-size: 24px; font-weight: 800; }
  .progress-track { height: 6px; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; }
  .progress-count { font-size: 11px; font-weight: 400; margin-top: 6px; }

  .checklist { padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }
  .check-group-title { font-size: 12px; font-weight: 600; padding: 12px 4px 6px; display: flex; justify-content: space-between; }
  .check-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 14px; }
  .check-box { width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0; }
  .check-text { font-size: 14px; }

  .template-section { padding: 0 16px; margin-top: 20px; }
  .template-title { font-size: 12px; font-weight: 600; padding: 0 4px; margin-bottom: 10px; }
  .template-card { display: flex; align-items: center; gap: 14px; padding: 16px; border-radius: 16px; margin-bottom: 8px; }
  .template-emoji { font-size: 28px; }
  .template-info { flex: 1; }
  .template-name { font-size: 15px; font-weight: 600; }
  .template-count { font-size: 12px; margin-top: 2px; }
  .template-actions { display: flex; gap: 12px; font-size: 12px; font-weight: 500; }

  /* LIGHT */
  .light .screen { background: #f6f4f1; }
  .light .home-indicator { background: rgba(0,0,0,0.18); }
  .light .hero-eyebrow { color: #4a8a6a; }
  .light .hero-title { color: #1a1816; }
  .light .hero-sub { color: #9a9590; }
  .light .progress-card { background: linear-gradient(145deg, #2d4a3a 0%, #1e3528 100%); }
  .light .progress-label { color: rgba(255,255,255,0.5); }
  .light .progress-pct { color: #fff; }
  .light .progress-track { background: rgba(255,255,255,0.1); }
  .light .progress-fill { background: #7aba95; }
  .light .progress-count { color: rgba(255,255,255,0.4); }
  .light .check-group-title { color: #8a8580; }
  .light .check-item { background: #fff; border: 0.5px solid rgba(0,0,0,0.04); }
  .light .check-box { border: 2px solid rgba(0,0,0,0.12); }
  .light .check-text { color: #3a3530; }
  .light .template-title { color: #8a8580; }
  .light .template-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.04); }
  .light .template-name { color: #1a1816; }
  .light .template-count { color: #9a9590; }
  .light .template-actions { color: #4a8a6a; }

  /* DARK */
  .dark .screen { background: #111110; }
  .dark .home-indicator { background: rgba(255,255,255,0.2); }
  .dark .hero-eyebrow { color: #7aba95; }
  .dark .hero-title { color: #f0ece8; }
  .dark .hero-sub { color: #4a4540; }
  .dark .progress-card { background: linear-gradient(145deg, #152a1e 0%, #0e1e14 100%); border: 0.5px solid rgba(122,186,149,0.08); }
  .dark .progress-label { color: #5a5550; }
  .dark .progress-pct { color: #f0ece8; }
  .dark .progress-track { background: rgba(255,255,255,0.06); }
  .dark .progress-fill { background: #7aba95; }
  .dark .progress-count { color: #4a4540; }
  .dark .check-group-title { color: #5a5550; }
  .dark .check-item { background: rgba(255,255,255,0.02); border: 0.5px solid rgba(255,255,255,0.05); }
  .dark .check-box { border: 2px solid rgba(255,255,255,0.1); }
  .dark .check-text { color: #c0bab5; }
  .dark .template-title { color: #5a5550; }
  .dark .template-card { background: rgba(255,255,255,0.02); border: 0.5px solid rgba(255,255,255,0.05); }
  .dark .template-name { color: #f0ece8; }
  .dark .template-count { color: #5a5550; }
  .dark .template-actions { color: #7aba95; }
</style>
</head>
<body>

<!-- LIGHT -->
<div class="column">
  <div class="frame-label">Light · 旅行清单</div>
  <div class="phone light">
    <div class="screen">
      <div class="hero"><div class="hero-eyebrow">旅行清单</div><div class="hero-title">澳洲</div><div class="hero-sub">2026/6/12 出发</div></div>
      <div class="progress-card"><div class="progress-header"><span class="progress-label">进度</span><span class="progress-pct">0%</span></div><div class="progress-track"><div class="progress-fill" style="width:0%"></div></div><div class="progress-count">0/41 项</div></div>
      <div class="checklist">
        <div class="check-group-title"><span>证件文件</span><span>0/7</span></div>
        <div class="check-item"><div class="check-box"></div><span class="check-text">护照</span></div>
        <div class="check-item"><div class="check-box"></div><span class="check-text">澳洲签证/ETA</span></div>
        <div class="check-item"><div class="check-box"></div><span class="check-text">机票行程单</span></div>
        <div class="check-item"><div class="check-box"></div><span class="check-text">酒店确认函</span></div>
        <div class="check-item"><div class="check-box"></div><span class="check-text">旅行保险单</span></div>
      </div>
      <div class="template-section">
        <div class="template-title">我的模板</div>
        <div class="template-card"><span class="template-emoji">🚗</span><div class="template-info"><div class="template-name">国内短途</div><div class="template-count">21 项</div></div><div class="template-actions"><span>使用</span><span>编辑</span></div></div>
        <div class="template-card"><span class="template-emoji">🧳</span><div class="template-info"><div class="template-name">国内长途</div><div class="template-count">45 项</div></div><div class="template-actions"><span>使用</span><span>编辑</span></div></div>
      </div>
    </div>
    <div class="home-indicator"></div>
  </div>
</div>

<!-- DARK -->
<div class="column">
  <div class="frame-label">Dark · 旅行清单</div>
  <div class="phone dark">
    <div class="screen">
      <div class="hero"><div class="hero-eyebrow">旅行清单</div><div class="hero-title">澳洲</div><div class="hero-sub">2026/6/12 出发</div></div>
      <div class="progress-card"><div class="progress-header"><span class="progress-label">进度</span><span class="progress-pct">0%</span></div><div class="progress-track"><div class="progress-fill" style="width:0%"></div></div><div class="progress-count">0/41 项</div></div>
      <div class="checklist">
        <div class="check-group-title"><span>证件文件</span><span>0/7</span></div>
        <div class="check-item"><div class="check-box"></div><span class="check-text">护照</span></div>
        <div class="check-item"><div class="check-box"></div><span class="check-text">澳洲签证/ETA</span></div>
        <div class="check-item"><div class="check-box"></div><span class="check-text">机票行程单</span></div>
        <div class="check-item"><div class="check-box"></div><span class="check-text">酒店确认函</span></div>
        <div class="check-item"><div class="check-box"></div><span class="check-text">旅行保险单</span></div>
      </div>
      <div class="template-section">
        <div class="template-title">我的模板</div>
        <div class="template-card"><span class="template-emoji">🚗</span><div class="template-info"><div class="template-name">国内短途</div><div class="template-count">21 项</div></div><div class="template-actions"><span>使用</span><span>编辑</span></div></div>
        <div class="template-card"><span class="template-emoji">🧳</span><div class="template-info"><div class="template-name">国内长途</div><div class="template-count">45 项</div></div><div class="template-actions"><span>使用</span><span>编辑</span></div></div>
      </div>
    </div>
    <div class="home-indicator"></div>
  </div>
</div>

</body>
</html>
