<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记账本 · 统计页 PRD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #e8e4df; padding: 48px 24px; display: flex; flex-wrap: wrap; justify-content: center; gap: 56px; min-height: 100vh; }
  .column { display: flex; flex-direction: column; align-items: center; }
  .frame-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #9a9590; margin-bottom: 16px; }
  .phone { width: 393px; height: 852px; border-radius: 55px; position: relative; overflow: hidden; box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 40px 100px -20px rgba(0,0,0,0.15); }
  .phone::before { content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 126px; height: 37px; background: #000; border-radius: 20px; z-index: 100; }
  .screen { width: 100%; height: 100%; overflow-y: auto; padding: 72px 0 72px; }
  .screen::-webkit-scrollbar { display: none; }
  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; z-index: 50; }
  .tab-bar { position: absolute; bottom: 20px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-around; padding: 10px 4px; border-radius: 16px; z-index: 90; }
  .tab-item { font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 10px; cursor: pointer; }

  .hero { padding: 0 24px; margin-bottom: 20px; }
  .hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .hero-title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; }

  /* 月度对比卡 - 核心：本月 vs 上月 */
  .compare-card { margin: 0 16px 16px; border-radius: 20px; padding: 22px; display: flex; justify-content: space-between; align-items: flex-end; }
  .compare-main {}
  .compare-amount { font-size: 34px; font-weight: 900; letter-spacing: -1.5px; line-height: 1; }
  .compare-label { font-size: 11px; font-weight: 500; margin-top: 6px; }
  .compare-change { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 8px; margin-top: 10px; }
  .compare-side { text-align: right; }
  .compare-side-amount { font-size: 18px; font-weight: 700; }
  .compare-side-label { font-size: 10px; font-weight: 400; margin-top: 2px; }

  /* 趋势图 - 占大面积 */
  .trend-card { margin: 0 16px 16px; border-radius: 18px; padding: 18px 20px; }
  .trend-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .trend-title { font-size: 13px; font-weight: 600; }
  .trend-period { font-size: 11px; font-weight: 500; }
  .trend-chart { height: 100px; display: flex; align-items: flex-end; gap: 4px; padding: 0 2px; }
  .trend-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.3s; }
  .trend-bar.highlight {}
  .trend-x { display: flex; justify-content: space-between; margin-top: 8px; font-size: 9px; font-weight: 500; }

  /* 分类占比 - 可视化条 */
  .category-card { margin: 0 16px; border-radius: 18px; padding: 18px 20px; }
  .category-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; }
  .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .cat-label { font-size: 12px; font-weight: 500; min-width: 48px; }
  .cat-bar-track { flex: 1; height: 8px; border-radius: 4px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 4px; }
  .cat-amount { font-size: 12px; font-weight: 600; min-width: 50px; text-align: right; }

  /* LIGHT */
  .light .screen { background: #f6f4f1; }
  .light .home-indicator { background: rgba(0,0,0,0.18); }
  .light .tab-bar { background: rgba(255,255,255,0.72); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 0.5px solid rgba(255,255,255,0.8); box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .light .tab-item { color: #a0998f; }
  .light .tab-item.active { color: #8a6d3b; background: rgba(138,109,59,0.08); }
  .light .hero-eyebrow { color: #b49a5e; }
  .light .hero-title { color: #1a1816; }

  .light .compare-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.04); }
  .light .compare-amount { color: #c8645a; }
  .light .compare-label { color: #9a9590; }
  .light .compare-change { background: rgba(90,138,90,0.08); color: #4a7a4a; }
  .light .compare-change.up { background: rgba(200,100,90,0.08); color: #a04030; }
  .light .compare-side-amount { color: #3a3530; }
  .light .compare-side-label { color: #b0aaa5; }

  .light .trend-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.04); }
  .light .trend-title { color: #1a1816; }
  .light .trend-period { color: #9a9590; }
  .light .trend-bar { background: rgba(200,100,90,0.12); }
  .light .trend-bar.highlight { background: #c8645a; }
  .light .trend-x { color: #b0aaa5; }

  .light .category-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.04); }
  .light .category-title { color: #1a1816; }
  .light .cat-label { color: #6a6560; }
  .light .cat-bar-track { background: rgba(0,0,0,0.04); }
  .light .cat-bar-fill { background: #c8645a; }
  .light .cat-bar-fill.c2 { background: #d4956a; }
  .light .cat-bar-fill.c3 { background: #8a9a6a; }
  .light .cat-bar-fill.c4 { background: #6a8a9a; }
  .light .cat-amount { color: #3a3530; }

  /* DARK */
  .dark .screen { background: #111110; }
  .dark .home-indicator { background: rgba(255,255,255,0.2); }
  .dark .tab-bar { background: rgba(30,30,28,0.8); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 0.5px solid rgba(255,255,255,0.06); box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  .dark .tab-item { color: #4a4540; }
  .dark .tab-item.active { color: #c8a960; background: rgba(200,169,96,0.08); }
  .dark .hero-eyebrow { color: #c8a960; }
  .dark .hero-title { color: #f0ece8; }

  .dark .compare-card { background: rgba(255,255,255,0.02); border: 0.5px solid rgba(255,255,255,0.05); }
  .dark .compare-amount { color: #d88a7a; }
  .dark .compare-label { color: #5a5550; }
  .dark .compare-change { background: rgba(122,186,122,0.08); color: #7aba7a; }
  .dark .compare-change.up { background: rgba(216,138,122,0.08); color: #d88a7a; }
  .dark .compare-side-amount { color: #c0bab5; }
  .dark .compare-side-label { color: #4a4540; }

  .dark .trend-card { background: rgba(255,255,255,0.02); border: 0.5px solid rgba(255,255,255,0.05); }
  .dark .trend-title { color: #f0ece8; }
  .dark .trend-period { color: #5a5550; }
  .dark .trend-bar { background: rgba(216,138,122,0.1); }
  .dark .trend-bar.highlight { background: #d88a7a; }
  .dark .trend-x { color: #4a4540; }

  .dark .category-card { background: rgba(255,255,255,0.02); border: 0.5px solid rgba(255,255,255,0.05); }
  .dark .category-title { color: #f0ece8; }
  .dark .cat-label { color: #8a8580; }
  .dark .cat-bar-track { background: rgba(255,255,255,0.04); }
  .dark .cat-bar-fill { background: #d88a7a; }
  .dark .cat-bar-fill.c2 { background: #d4a56a; }
  .dark .cat-bar-fill.c3 { background: #8aba7a; }
  .dark .cat-bar-fill.c4 { background: #7aaab8; }
  .dark .cat-amount { color: #c0bab5; }
</style>
</head>
<body>

<!-- LIGHT -->
<div class="column">
  <div class="frame-label">Light · 记账统计</div>
  <div class="phone light">
    <div class="screen">
      <div class="hero"><div class="hero-eyebrow">记账本</div><div class="hero-title">6月支出分析</div></div>
      <div class="compare-card">
        <div class="compare-main">
          <div class="compare-amount">¥3,280</div>
          <div class="compare-label">本月总支出</div>
          <div class="compare-change">↓ 12% vs 上月</div>
        </div>
        <div class="compare-side">
          <div class="compare-side-amount">¥3,720</div>
          <div class="compare-side-label">上月</div>
        </div>
      </div>
      <div class="trend-card">
        <div class="trend-header"><span class="trend-title">每日支出</span><span class="trend-period">6月</span></div>
        <div class="trend-chart">
          <div class="trend-bar" style="height:30%"></div><div class="trend-bar" style="height:15%"></div><div class="trend-bar" style="height:45%"></div><div class="trend-bar" style="height:20%"></div><div class="trend-bar highlight" style="height:80%"></div><div class="trend-bar" style="height:35%"></div><div class="trend-bar" style="height:25%"></div><div class="trend-bar" style="height:60%"></div><div class="trend-bar" style="height:10%"></div><div class="trend-bar" style="height:40%"></div><div class="trend-bar" style="height:55%"></div><div class="trend-bar highlight" style="height:90%"></div><div class="trend-bar" style="height:20%"></div>
        </div>
        <div class="trend-x"><span>1</span><span>5</span><span>10</span><span>13</span></div>
      </div>
      <div class="category-card">
        <div class="category-title">分类占比</div>
        <div class="cat-row"><span class="cat-label">餐饮</span><div class="cat-bar-track"><div class="cat-bar-fill" style="width:65%"></div></div><span class="cat-amount">¥1,280</span></div>
        <div class="cat-row"><span class="cat-label">交通</span><div class="cat-bar-track"><div class="cat-bar-fill c2" style="width:35%"></div></div><span class="cat-amount">¥680</span></div>
        <div class="cat-row"><span class="cat-label">购物</span><div class="cat-bar-track"><div class="cat-bar-fill c3" style="width:28%"></div></div><span class="cat-amount">¥540</span></div>
        <div class="cat-row"><span class="cat-label">娱乐</span><div class="cat-bar-track"><div class="cat-bar-fill c4" style="width:18%"></div></div><span class="cat-amount">¥360</span></div>
      </div>
    </div>
    <div class="tab-bar"><div class="tab-item">首页</div><div class="tab-item">流水</div><div class="tab-item active">统计</div><div class="tab-item">资产</div><div class="tab-item">工具</div></div>
    <div class="home-indicator"></div>
  </div>
</div>

<!-- DARK -->
<div class="column">
  <div class="frame-label">Dark · 记账统计</div>
  <div class="phone dark">
    <div class="screen">
      <div class="hero"><div class="hero-eyebrow">记账本</div><div class="hero-title">6月支出分析</div></div>
      <div class="compare-card">
        <div class="compare-main">
          <div class="compare-amount">¥3,280</div>
          <div class="compare-label">本月总支出</div>
          <div class="compare-change">↓ 12% vs 上月</div>
        </div>
        <div class="compare-side">
          <div class="compare-side-amount">¥3,720</div>
          <div class="compare-side-label">上月</div>
        </div>
      </div>
      <div class="trend-card">
        <div class="trend-header"><span class="trend-title">每日支出</span><span class="trend-period">6月</span></div>
        <div class="trend-chart">
          <div class="trend-bar" style="height:30%"></div><div class="trend-bar" style="height:15%"></div><div class="trend-bar" style="height:45%"></div><div class="trend-bar" style="height:20%"></div><div class="trend-bar highlight" style="height:80%"></div><div class="trend-bar" style="height:35%"></div><div class="trend-bar" style="height:25%"></div><div class="trend-bar" style="height:60%"></div><div class="trend-bar" style="height:10%"></div><div class="trend-bar" style="height:40%"></div><div class="trend-bar" style="height:55%"></div><div class="trend-bar highlight" style="height:90%"></div><div class="trend-bar" style="height:20%"></div>
        </div>
        <div class="trend-x"><span>1</span><span>5</span><span>10</span><span>13</span></div>
      </div>
      <div class="category-card">
        <div class="category-title">分类占比</div>
        <div class="cat-row"><span class="cat-label">餐饮</span><div class="cat-bar-track"><div class="cat-bar-fill" style="width:65%"></div></div><span class="cat-amount">¥1,280</span></div>
        <div class="cat-row"><span class="cat-label">交通</span><div class="cat-bar-track"><div class="cat-bar-fill c2" style="width:35%"></div></div><span class="cat-amount">¥680</span></div>
        <div class="cat-row"><span class="cat-label">购物</span><div class="cat-bar-track"><div class="cat-bar-fill c3" style="width:28%"></div></div><span class="cat-amount">¥540</span></div>
        <div class="cat-row"><span class="cat-label">娱乐</span><div class="cat-bar-track"><div class="cat-bar-fill c4" style="width:18%"></div></div><span class="cat-amount">¥360</span></div>
      </div>
    </div>
    <div class="tab-bar"><div class="tab-item">首页</div><div class="tab-item">流水</div><div class="tab-item active">统计</div><div class="tab-item">资产</div><div class="tab-item">工具</div></div>
    <div class="home-indicator"></div>
  </div>
</div>

</body>
</html>
